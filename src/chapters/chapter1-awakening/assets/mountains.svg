<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="mtnFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4a7a"/>
      <stop offset="100%" stop-color="#1e3860"/>
    </linearGradient>
    <linearGradient id="mtnMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3456"/>
      <stop offset="100%" stop-color="#16284a"/>
    </linearGradient>
    <linearGradient id="mtnNear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e1e38"/>
      <stop offset="100%" stop-color="#080e1c"/>
    </linearGradient>
    <!-- Snow caps -->
    <linearGradient id="snowCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0ebe0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f0ebe0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Far range — lightest -->
  <g opacity="0.5">
    <polygon points="0,900 0,620 160,480 300,560 420,430 560,510 680,380 820,470 950,340 1080,440 1200,360 1340,450 1440,420 1440,900" fill="url(#mtnFar)"/>
  </g>

  <!-- Mid range -->
  <g opacity="0.75">
    <polygon points="0,900 0,700 100,580 200,640 340,520 480,600 600,480 720,550 860,420 980,510 1100,460 1220,540 1340,490 1440,560 1440,900" fill="url(#mtnMid)"/>
    <!-- Snow on tallest mid peak -->
    <polygon points="820,420 860,420 940,340 980,420 940,410" fill="url(#snowCap)" opacity="0.7"/>
  </g>

  <!-- Near range — darkest silhouette -->
  <g opacity="0.9">
    <polygon points="0,900 0,760 80,680 180,720 280,650 380,700 500,620 620,680 740,600 860,660 980,590 1100,650 1220,600 1340,650 1440,620 1440,900" fill="url(#mtnNear)"/>
  </g>
</svg>

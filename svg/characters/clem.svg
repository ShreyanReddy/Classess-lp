<svg xmlns="http://www.w3.org/2000/svg" viewBox="-35 -70 70 130" width="70" height="130">
  <!--
    CLEM — Standing (base state)
    Exactly 8 SVG elements per spec:
    1. Head (organic ellipse)
    2. Neck
    3. Body
    4. Arm A (left)
    5. Arm B (right)
    6. Leg A (left)
    7. Leg B (right)
    [Body group wrapper counts as container, not element]
  -->
  <g class="clem-body-group" id="clem-standing">
    <!-- 1. Head — organic ellipse, orange, slightly taller than wide -->
    <ellipse class="clem-head clem-all" cx="0" cy="-42" rx="18" ry="20" fill="#F4834A"/>

    <!-- 2. Neck -->
    <line class="clem-neck clem-all" x1="0" y1="-22" x2="0" y2="-14"
          stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>

    <!-- 3. Body -->
    <line class="clem-body clem-all" x1="0" y1="-14" x2="0" y2="28"
          stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>

    <!-- 4. Arm A (left) — at rest, 30° from vertical -->
    <line class="clem-arm-a clem-all" x1="0" y1="-6" x2="-16" y2="18"
          stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>

    <!-- 5. Arm B (right) — at rest, 30° from vertical -->
    <line class="clem-arm-b clem-all" x1="0" y1="-6" x2="16" y2="18"
          stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>

    <!-- 6. Leg A (left) — at rest, 20° from vertical -->
    <line class="clem-leg-a clem-all" x1="0" y1="28" x2="-12" y2="66"
          stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>

    <!-- 7. Leg B (right) — at rest, 20° from vertical -->
    <line class="clem-leg-b clem-all" x1="0" y1="28" x2="12" y2="66"
          stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>

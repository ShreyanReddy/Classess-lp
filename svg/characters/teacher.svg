<svg xmlns="http://www.w3.org/2000/svg" viewBox="-35 -75 70 140" width="70" height="140">
  <!-- TEACHER — Slightly taller build, right arm pointing up-right -->
  <g class="char-body-group" id="teacher">
    <!-- Teacher glow behind head -->
    <circle cx="0" cy="-44" r="38" fill="#2A7A6A" class="teacher-glow" opacity="0.25"/>

    <!-- 1. Head — deep teal -->
    <ellipse cx="0" cy="-44" rx="18" ry="20" fill="#2A7A6A"/>

    <!-- 2. Neck -->
    <line x1="0" y1="-24" x2="0" y2="-16"
          stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>

    <!-- 3. Body — slightly longer (taller character) -->
    <line x1="0" y1="-16" x2="0" y2="30"
          stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>

    <!-- 4. Arm A (left) — at side -->
    <line x1="0" y1="-4" x2="-16" y2="20"
          stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>

    <!-- 5. Arm B (right) — raised, pointing at board, animated -->
    <line class="teacher-arm-pointing" x1="0" y1="-4" x2="24" y2="-22"
          stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>

    <!-- 6. Leg A -->
    <line x1="0" y1="30" x2="-11" y2="68"
          stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>

    <!-- 7. Leg B -->
    <line x1="0" y1="30" x2="11" y2="68"
          stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>

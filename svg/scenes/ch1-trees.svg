<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <!-- Trees — mid-distance. Three shade values, all flat. -->

  <!-- Helper: a single tree at origin (trunk + 3 foliage circles) -->
  <!-- Placed across the scene at varied heights for depth -->

  <!-- Tree cluster — left -->
  <g transform="translate(60, 640)">
    <rect x="16" y="80" width="10" height="50" fill="#5A3018"/>
    <circle cx="21" cy="55"  r="38" fill="#1A5E2A"/>
    <circle cx="0"  cy="70"  r="28" fill="#247034"/>
    <circle cx="42" cy="68"  r="30" fill="#1A5E2A"/>
    <circle cx="21" cy="40"  r="26" fill="#247034"/>
  </g>

  <g transform="translate(150, 655)">
    <rect x="13" y="70" width="8" height="45" fill="#5A3018"/>
    <circle cx="17" cy="48"  r="32" fill="#2E7A3E"/>
    <circle cx="2"  cy="60"  r="22" fill="#1A5E2A"/>
    <circle cx="32" cy="60"  r="26" fill="#2E7A3E"/>
  </g>

  <!-- Tree cluster — center-left -->
  <g transform="translate(420, 630)">
    <rect x="14" y="75" width="9" height="48" fill="#5A3018"/>
    <circle cx="18" cy="52"  r="36" fill="#1A5E2A"/>
    <circle cx="0"  cy="66"  r="26" fill="#247034"/>
    <circle cx="36" cy="65"  r="28" fill="#1A5E2A"/>
    <circle cx="18" cy="38"  r="24" fill="#247034"/>
  </g>

  <!-- Tree cluster — center -->
  <g transform="translate(820, 645)">
    <rect x="14" y="72" width="9" height="45" fill="#5A3018"/>
    <circle cx="18" cy="50"  r="34" fill="#2E7A3E"/>
    <circle cx="0"  cy="63"  r="25" fill="#1A5E2A"/>
    <circle cx="36" cy="62"  r="27" fill="#2E7A3E"/>
  </g>

  <g transform="translate(900, 660)">
    <rect x="12" y="68" width="8" height="42" fill="#5A3018"/>
    <circle cx="16" cy="46"  r="30" fill="#247034"/>
    <circle cx="0"  cy="58"  r="22" fill="#1A5E2A"/>
    <circle cx="30" cy="57"  r="24" fill="#247034"/>
    <circle cx="16" cy="34"  r="20" fill="#2E7A3E"/>
  </g>

  <!-- Tree cluster — right -->
  <g transform="translate(1200, 638)">
    <rect x="15" y="76" width="10" height="48" fill="#5A3018"/>
    <circle cx="20" cy="53"  r="36" fill="#1A5E2A"/>
    <circle cx="0"  cy="66"  r="26" fill="#247034"/>
    <circle cx="40" cy="65"  r="28" fill="#1A5E2A"/>
    <circle cx="20" cy="40"  r="24" fill="#2E7A3E"/>
  </g>

  <g transform="translate(1310, 650)">
    <rect x="12" y="68" width="8" height="44" fill="#5A3018"/>
    <circle cx="16" cy="46"  r="30" fill="#2E7A3E"/>
    <circle cx="0"  cy="58"  r="22" fill="#1A5E2A"/>
    <circle cx="30" cy="57"  r="25" fill="#2E7A3E"/>
  </g>
</svg>

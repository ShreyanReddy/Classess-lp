<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <filter id="cloudBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="cloudBlurSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <!-- Deep background clouds — large, blurry -->
  <ellipse cx="200" cy="400" rx="320" ry="80" fill="#c8a87a" opacity="0.15" filter="url(#cloudBlur)"/>
  <ellipse cx="1200" cy="350" rx="280" ry="70" fill="#d4b68a" opacity="0.12" filter="url(#cloudBlur)"/>
  <ellipse cx="700" cy="420" rx="350" ry="90" fill="#c0a070" opacity="0.10" filter="url(#cloudBlur)"/>

  <!-- Mid clouds — warm dawn-lit -->
  <g opacity="0.55" filter="url(#cloudBlurSoft)">
    <!-- Cloud 1 left -->
    <ellipse cx="160" cy="300" rx="180" ry="45" fill="#e8c49a"/>
    <ellipse cx="100" cy="310" rx="100" ry="38" fill="#eecba0"/>
    <ellipse cx="220" cy="295" rx="120" ry="36" fill="#f0d0a5"/>
  </g>
  <g opacity="0.45" filter="url(#cloudBlurSoft)">
    <!-- Cloud 2 right -->
    <ellipse cx="1280" cy="280" rx="200" ry="50" fill="#e0ba90"/>
    <ellipse cx="1210" cy="290" rx="130" ry="40" fill="#ecc498"/>
    <ellipse cx="1350" cy="285" rx="110" ry="38" fill="#f0cba0"/>
  </g>
  <g opacity="0.35" filter="url(#cloudBlurSoft)">
    <!-- Cloud 3 center-right -->
    <ellipse cx="900" cy="320" rx="220" ry="55" fill="#ddb585"/>
    <ellipse cx="840" cy="330" rx="140" ry="44" fill="#e8bf8e"/>
    <ellipse cx="960" cy="325" rx="160" ry="42" fill="#ecc595"/>
  </g>
  <!-- Thin atmospheric haze band -->
  <rect x="0" y="560" width="1440" height="60" fill="#e8b870" opacity="0.08"/>
</svg>

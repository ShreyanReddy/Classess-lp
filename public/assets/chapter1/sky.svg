<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice" width="100%" height="100%">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="35%" stop-color="#1a3a6e"/>
      <stop offset="65%" stop-color="#c76b2e"/>
      <stop offset="85%" stop-color="#e8974a"/>
      <stop offset="100%" stop-color="#f5c07a"/>
    </linearGradient>
    <!-- Stars -->
    <radialGradient id="starGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1440" height="900" fill="url(#skyGrad)"/>
  <!-- Stars (subtle) -->
  <g opacity="0.6">
    <circle cx="120" cy="80" r="1.2" fill="white" opacity="0.8"/>
    <circle cx="280" cy="40" r="0.8" fill="white" opacity="0.6"/>
    <circle cx="450" cy="120" r="1.0" fill="white" opacity="0.7"/>
    <circle cx="620" cy="60" r="0.9" fill="white" opacity="0.5"/>
    <circle cx="780" cy="90" r="1.1" fill="white" opacity="0.8"/>
    <circle cx="940" cy="35" r="0.8" fill="white" opacity="0.6"/>
    <circle cx="1100" cy="100" r="1.0" fill="white" opacity="0.7"/>
    <circle cx="1260" cy="55" r="1.2" fill="white" opacity="0.5"/>
    <circle cx="1380" cy="130" r="0.7" fill="white" opacity="0.4"/>
    <circle cx="200" cy="150" r="0.9" fill="white" opacity="0.6"/>
    <circle cx="360" cy="170" r="0.8" fill="white" opacity="0.5"/>
    <circle cx="540" cy="190" r="1.0" fill="white" opacity="0.4"/>
    <circle cx="860" cy="160" r="0.9" fill="white" opacity="0.5"/>
    <circle cx="1020" cy="180" r="0.7" fill="white" opacity="0.4"/>
    <circle cx="1180" cy="140" r="1.1" fill="white" opacity="0.6"/>
    <circle cx="1340" cy="170" r="0.8" fill="white" opacity="0.4"/>
  </g>
  <!-- Horizon glow -->
  <ellipse cx="720" cy="900" rx="500" ry="200" fill="#f5c07a" opacity="0.3"/>
</svg>
